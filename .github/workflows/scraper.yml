name: Weekly Blog Scraper

on:
  schedule:
    # 매주 금요일 KST 12:20에 실행 (UTC 03:20)
    - cron: '20 3 * * 5'
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드 (test: 예약 없이 케빈, 제이슨에게 테스트 발송 / full: 전체 발송)'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - full

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Korean Fonts for Selenium Screenshots
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum fonts-nanum-coding fonts-nanum-extra
          fc-cache -fv

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          # Set explicit timezone for Python's datetime.now() inside ubuntu runner
          TZ: Asia/Seoul
        run: |
          # 기본적으로 schedule(자동 예약 발송)은 full 모드로 동작
          MODE="${{ github.event.inputs.mode || 'full' }}"
          echo "Running in $MODE mode..."
          
          if [ "$MODE" == "test" ]; then
            python execution/scrape_naver_test_email.py
          else
            python execution/scrape_naver_email.py --mode full
          fi
